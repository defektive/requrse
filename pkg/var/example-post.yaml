name: Xodbox POST Example
url: https://{{ .Host }}/l/api/v1/inspect.json?ssp={{.LastResponse.BodyObject.remote_addr}}
method: POST
headers:
  authorization: Token {{ .AuthToken }}
  content-type: text/json
body: '{"version":"v1","page": {{.Page}}, "includes":[]}'
stop_when:
  - 'select(.body_object.body | contains(": 10,")) | .'
